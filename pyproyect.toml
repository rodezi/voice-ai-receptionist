[project]
name = "ai-voice-operations"
version = "0.1.0"
description = "Agente de voz IA para inmobiliaria CDMX - Retell AI + Twilio + Airtable + Cal.com"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "anthropic>=0.40.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
    "twilio>=9.0.0",
    "pyairtable>=2.3.0",
    "jinja2>=3.1.0",
    "python-multipart>=0.0.9",
]

[tool.hatch.build.targets.wheel]
packages = ["webhooks", "integrations", "dashboard", "utils"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
